<!doctype html><html><head><meta charset="utf-8"><style>
html,body{margin:0;padding:0;background:#000}
canvas{display:block}
</style></head><body>
<canvas id="c"></canvas>
<script>
const q=new URLSearchParams(location.search);
const l=q.get('l'), r=q.get('r'), ll=q.get('ll')||'', rl=q.get('rl')||'', theme=q.get('theme')||'';
const BAND=46;
const c=document.getElementById('c'), ctx=c.getContext('2d');
const imgL=new Image(), imgR=new Image();
let n=0;
function ready(){
  if(++n<2) return;
  const w=imgL.naturalWidth+imgR.naturalWidth;
  const h=Math.max(imgL.naturalHeight,imgR.naturalHeight);
  c.width=w; c.height=h+BAND;
  // label band
  ctx.fillStyle='#000'; ctx.fillRect(0,0,w,BAND);
  ctx.fillStyle='#ffdd00'; ctx.font='28px monospace'; ctx.textBaseline='middle';
  ctx.fillText(theme+':  [ '+ll+' ]  |  [ '+rl+' ]', 12, BAND/2);
  // images
  ctx.drawImage(imgL,0,BAND);
  ctx.drawImage(imgR,imgL.naturalWidth,BAND);
  // red seam at join
  ctx.strokeStyle='red'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(imgL.naturalWidth,BAND); ctx.lineTo(imgL.naturalWidth,h+BAND); ctx.stroke();
  document.body.setAttribute('data-ready','1');
  document.title='SEAM_READY_'+w+'x'+(h+BAND);
}
imgL.onload=ready; imgR.onload=ready;
imgL.onerror=()=>{document.title='ERR_L';}; imgR.onerror=()=>{document.title='ERR_R';};
imgL.src=l; imgR.src=r;
</script></body></html>
